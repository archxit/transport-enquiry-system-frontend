<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Route Management</h2>
        <form id="routeForm" class="mb-4">
            <input type="text" id="source" class="form-control mb-2" placeholder="Enter source" required>
            <input type="text" id="destination" class="form-control mb-2" placeholder="Enter destination" required>
            <button type="submit" class="btn btn-primary w-100">Add Route</button>
        </form>
        <h3>Route List</h3>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Source</th>
                    <th>Destination</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="routeTableBody">
            </tbody>
        </table>
    </div>
    <script src="js/route.js"></script>
</body>
</html>
