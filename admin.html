<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Admin Management</h2>
        <form id="adminForm" class="mb-4">
            <input type="text" id="username" class="form-control mb-2" placeholder="Enter username" required>
            <input type="password" id="password" class="form-control mb-2" placeholder="Enter password" required>
            <button type="submit" class="btn btn-primary w-100">Add Admin</button>
        </form>
        <h3>Admin List</h3>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
            </tbody>
        </table>
    </div>
    <script src="js/admin.js"></script>
</body>
</html>
